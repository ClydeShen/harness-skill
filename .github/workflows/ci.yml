name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm to match local version
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Validate promptfoo configs
        run: |
          for f in evals/promptfoo/*.yaml; do
            echo "Validating $f..."
            npx promptfoo validate config -c "$f"
          done

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: python -m py_compile evals/run_evals.py evals/promptfoo/provider.py evals/promptfoo/grader.py evals/promptfoo/scaffold_helper.py

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python
        run: ruff check evals/
