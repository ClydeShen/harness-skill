# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: caveman skill eval suite

prompts:
  - id: skill-prompt
    raw: "{{prompt}}"

providers:
  - id: python:provider.py
    label: llamacpp-caveman
    config:
      skill_name: caveman

defaultTest:
  options:
    provider: python:grader.py
  assert:
    - type: latency
      threshold: 300000

outputPath: output-caveman.json

tests:

  # ---------------------------------------------------------------------------
  # Eval 1: /caveman — switches mode immediately, compressed, accurate
  # ---------------------------------------------------------------------------
  - description: "#1 /caveman — switches immediately, drops filler, retains accuracy"
    vars:
      prompt: "/caveman"
      scaffold_files:
        - "package.json"
    assert:
      - type: llm-rubric
        value: Immediately switches to compressed caveman communication mode
      - type: llm-rubric
        value: Drops articles, filler words, and pleasantries
      - type: llm-rubric
        value: Retains full technical accuracy — code blocks unchanged, errors quoted exact
      - type: llm-rubric
        value: Stays in caveman mode for subsequent responses without reverting

  # ---------------------------------------------------------------------------
  # Eval 2: /caveman + question — caveman mode throughout technical explanation
  # ---------------------------------------------------------------------------
  - description: "#2 /caveman + technical question — caveman throughout, substance preserved"
    vars:
      prompt: |
        /caveman

        Explain how database connection pooling works
      scaffold_files:
        - "package.json"
    assert:
      - type: llm-rubric
        value: Responds in caveman mode throughout — no filler, no articles
      - type: llm-rubric
        value: Technical substance is preserved despite compression
      - type: llm-rubric
        value: Does not revert to normal mode mid-response
      - type: llm-rubric
        value: "Uses pattern: [thing] [action] [reason]. [next step]."
