# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: context-handover skill eval suite

prompts:
  - id: skill-prompt
    raw: "{{prompt}}"

providers:
  - id: python:provider.py
    label: omlx-context-handover
    config:
      skill_name: context-handover

defaultTest:
  options:
    provider: python:grader.py
  assert:
    - type: latency
      threshold: 300000

outputPath: output-context-handover.json

tests:

  # ---------------------------------------------------------------------------
  # Eval 1: execute phase, state.json present, issue #42
  # ---------------------------------------------------------------------------
  - description: "#1 execute phase handover — state.json + issue #42"
    vars:
      prompt: "My context is at 82%. Please run context-handover. I'm working on issue #42 'Add auth middleware', execute phase."
      scaffold_files:
        - ".harness/state.json with status in_progress phase 03-execute active_task issue 42"
        - "CLAUDE.md"
    assert:
      - type: llm-rubric
        value: Writes .continue-here.json under .harness/phases/03-execute/ — not .claude/handoff.md or a timestamped path
      - type: llm-rubric
        value: .continue-here.json includes JSON fields phase, task, status, last_updated, next_action, completed_work, remaining_work
      - type: llm-rubric
        value: Updates .harness/state.json session.status to idle
      - type: llm-rubric
        value: Instructs user to type /compact — does NOT invoke /compact programmatically
      - type: llm-rubric
        value: Instructs user to start next session with /session-start

  # ---------------------------------------------------------------------------
  # Eval 2: No state.json — falls back gracefully
  # ---------------------------------------------------------------------------
  - description: "#2 no state.json — fallback chain, still writes handoff"
    vars:
      prompt: "Please do a context handover. I'm getting close to the limit."
      scaffold_files:
        - "package.json"
    assert:
      - type: llm-rubric
        value: Still writes a .continue-here.json or fallback handoff doc despite missing state.json
      - type: llm-rubric
        value: Does NOT error or refuse because state.json is absent
      - type: llm-rubric
        value: Notes somewhere that phase was inferred (not from state.json)

  # ---------------------------------------------------------------------------
  # Eval 3: User states next session focus — references artifacts by path
  # ---------------------------------------------------------------------------
  - description: "#3 stated next-session focus — no inline content from MEMORY.md"
    vars:
      prompt: "Context handover — next session will focus on writing tests."
      scaffold_files:
        - "CLAUDE.md"
        - "MEMORY.md"
        - ".harness/state.json with status in_progress phase 03-execute"
    assert:
      - type: llm-rubric
        value: .continue-here.json does not inline the content of MEMORY.md or any source files
      - type: llm-rubric
        value: .continue-here.json references MEMORY.md by path only
      - type: llm-rubric
        value: next_action field reflects the user's stated focus on writing tests
      - type: llm-rubric
        value: Instructs user to type /compact
