# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: harness-issues skill eval suite

prompts:
  - id: skill-prompt
    raw: "{{prompt}}"

providers:
  - id: python:provider.py
    label: llamacpp-harness-issues
    config:
      skill_name: harness-issues

defaultTest:
  options:
    provider: python:grader.py
  assert:
    - type: latency
      threshold: 300000

outputPath: output-harness-issues.json

tests:

  # ---------------------------------------------------------------------------
  # Eval 1: Vertical slices — thin end-to-end slices, HITL/AFK labelled, quiz first
  # ---------------------------------------------------------------------------
  - description: "#1 vertical slices — HITL/AFK labelled, user quizzed before publish"
    vars:
      prompt: >
        /harness-issues
        Break down the authentication feature from our PRD into implementation issues.
      scaffold_files: '["package.json", "CLAUDE.md", "docs/prd.md with a feature spec for user authentication"]'
    assert:
      - type: llm-rubric
        value: Breaks the plan into vertical slices — each slice cuts through all integration layers end-to-end, not a single horizontal layer
      - type: llm-rubric
        value: Each slice is labelled either HITL or AFK
      - type: llm-rubric
        value: Mentions presenting the breakdown to the user before publishing — describes asking for feedback on granularity, dependency order, or HITL/AFK classification

  # ---------------------------------------------------------------------------
  # Eval 2: Enforced issue template — Story, Confidence, AC table, DoD, Effort, Dependencies
  # ---------------------------------------------------------------------------
  - description: "#2 enforced issue template — all required sections present"
    vars:
      prompt: >
        /harness-issues
        Create issues for the payment integration feature. We have a PRD ready.
      scaffold_files: '["package.json", "CLAUDE.md", "docs/prd.md with payment integration spec"]'
    assert:
      - type: llm-rubric
        value: Published issues contain a Story section (As a [role], I want [capability], so that [benefit])
      - type: llm-rubric
        value: Issues include an Acceptance Criteria section — criteria may appear as table rows or checklist items, and should reference a spec, user statement, or named best practice as source
      - type: llm-rubric
        value: Issues include a Definition of Done section and an Effort estimate in context windows

  # ---------------------------------------------------------------------------
  # Eval 3: Fetch from tracker — reads parent, publishes in dependency order, no modify
  # ---------------------------------------------------------------------------
  - description: "#3 from issue reference — reads parent, publishes blockers first"
    vars:
      prompt: >
        /harness-issues #5
        Break down issue #5 from the tracker into implementation issues.
      scaffold_files: '["package.json", "CLAUDE.md"]'
    assert:
      - type: llm-rubric
        value: Describes fetching or reading issue #5 from the tracker before drafting — mentions gh issue view, reading the issue body, or similar tracker lookup
      - type: llm-rubric
        value: Publishes issues in dependency order — blocking issues are created first so real IDs can be referenced
      - type: llm-rubric
        value: Does NOT close or modify the parent issue #5

  # ---------------------------------------------------------------------------
  # Eval 4: Three creation gates enforced
  # ---------------------------------------------------------------------------
  - description: "#4 three creation gates — estimable, size ≤8, demoable"
    vars:
      prompt: >
        /harness-issues
        Create issues for a vague feature: "improve the admin dashboard". No spec exists.
      scaffold_files: '["package.json", "CLAUDE.md"]'
    assert:
      - type: llm-rubric
        value: Does NOT immediately create issues — flags that the feature is not estimable or not specific enough before creation
      - type: llm-rubric
        value: Asks the user to refine the scope before publishing — mentions that stories must be estimable before issue creation

  # ---------------------------------------------------------------------------
  # Eval 5: Dual output — both GitHub Issues and PLAN.md
  # ---------------------------------------------------------------------------
  - description: "#5 dual output — PLAN.md written alongside GitHub issues"
    vars:
      prompt: >
        /harness-issues
        Break down the CSV export feature into issues and create the PLAN.md.
      scaffold_files: '["package.json", "CLAUDE.md", "docs/prd.md with CSV export spec"]'
    assert:
      - type: icontains
        value: ".harness/phases/02-plan"
      - type: llm-rubric
        value: Writes a PLAN.md file at .harness/phases/02-plan/02-PLAN.md in addition to publishing GitHub issues
      - type: llm-rubric
        value: Each PLAN.md task block contains a title, type, effort, what-to-build, and acceptance criteria

  # ---------------------------------------------------------------------------
  # Eval 6: board field sync per issue — Effort, Size, Priority set after each creation
  # ---------------------------------------------------------------------------
  - description: "#6 board field sync per issue — syncs fields after each issue is created"
    vars:
      prompt: >
        /harness-issues
        Break down the CSV export feature into issues and sync board fields.
      scaffold_files: '["package.json", "CLAUDE.md", "docs/prd.md with CSV export spec", ".claude/harness.json with project_fields populated"]'
    assert:
      - type: llm-rubric
        value: After each issue is created, fetches the issue node ID and adds it to the project board
      - type: llm-rubric
        value: Parses Effort from the issue body (Estimate line) and derives Size using the XS/S/M/L/XL mapping
      - type: llm-rubric
        value: Maps priority:p2 label to board Priority field value P2; prints per-issue confirmation with Effort, Size, and Priority

  # ---------------------------------------------------------------------------
  # Eval 7: board sync guard — skips with warning if project_fields absent
  # ---------------------------------------------------------------------------
  - description: "#7 board sync guard — skips per-issue sync when project_fields absent"
    vars:
      prompt: >
        /harness-issues
        Create issues for the search feature.
      scaffold_files: '["package.json", "CLAUDE.md", "docs/prd.md with search feature spec", ".claude/harness.json without project_fields"]'
    assert:
      - type: llm-rubric
        value: When project_fields is absent from harness.json, outputs a warning about missing project_fields and suggests running /setup-harness-skills to configure board fields
      - type: llm-rubric
        value: Issue creation itself is NOT blocked — issues are still created on GitHub even when board sync is skipped

  # ---------------------------------------------------------------------------
  # Eval 8: milestone issue discovery — treats Milestone as an issue type, not legacy milestone
  # ---------------------------------------------------------------------------
  - description: "#8 milestone issue discovery — finds parent Milestone-type issue and links as sub-issues"
    vars:
      prompt: >
        /harness-issues
        Break down the billing feature into issues. There is an open issue #3 of type Milestone called "v1.0 launch".
      scaffold_files: '["package.json", "CLAUDE.md", "docs/prd.md with billing feature spec"]'
    assert:
      - type: llm-rubric
        value: Queries for existing open issues with type Milestone (via gh api repos/.../issues?type=Milestone) before creating any issues — does NOT use gh milestone list or the --milestone flag
      - type: llm-rubric
        value: When a Milestone-type parent issue is found, links newly created issues as sub-issues of that parent via the sub-issues API (not via --milestone flag)
      - type: llm-rubric
        value: After creating each issue, sets its issue type via gh api PATCH with a type field — acknowledges that gh issue create has no --type flag

  # ---------------------------------------------------------------------------
  # Eval 9: sub-issue linkage — links created issues as sub-issues of parent or blocker
  # ---------------------------------------------------------------------------
  - description: "#9 sub-issue linkage — establishes parent-child relationships via GitHub API"
    vars:
      prompt: >
        /harness-issues #12
        Break down issue #12 into implementation issues. Issue #12 is an epic for the notification system.
      scaffold_files: '["package.json", "CLAUDE.md"]'
    assert:
      - type: llm-rubric
        value: After creating each issue, fetches the issue's database ID (the id field, not the issue number) via gh api repos/.../issues/<number> --jq '.id', then calls POST gh api repos/.../issues/12/sub_issues with sub_issue_id set to that database ID
      - type: llm-rubric
        value: For issues that are blocked by another newly created issue, also links the blocked issue as a sub-issue of its blocker via the sub-issues API using the database ID
      - type: llm-rubric
        value: Sub-issue linkage failure is non-blocking — if the API returns an error, prints a warning but continues creating the remaining issues
