# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: harness-prd skill eval suite

prompts:
  - id: skill-prompt
    raw: "{{prompt}}"

providers:
  - id: python:provider.py
    label: llamacpp-harness-prd
    config:
      skill_name: harness-prd

defaultTest:
  options:
    provider: python:grader.py
  assert:
    - type: latency
      threshold: 300000

outputPath: output-harness-prd.json

tests:

  # ---------------------------------------------------------------------------
  # Eval 1: Synthesizes from context — no interview, produces relevant output
  # ---------------------------------------------------------------------------
  - description: "#1 synthesizes from context — no interview, relevant content produced"
    vars:
      prompt: >
        /harness-prd
        We've been discussing adding a user authentication feature. Please write the PRD.
      scaffold_files:
        - "package.json"
        - "CLAUDE.md"
        - "src/index.ts"
    assert:
      - type: llm-rubric
        value: Does NOT ask the user clarifying questions before writing — synthesizes from the conversation context and proceeds directly to output
      - type: llm-rubric
        value: Output content is specific to user authentication — not a generic placeholder template with no feature-specific details

  # ---------------------------------------------------------------------------
  # Eval 2: PRD output contains core substance — problem, requirements, constraints
  # ---------------------------------------------------------------------------
  - description: "#2 PRD output contains problem, requirements, and constraints"
    vars:
      prompt: >
        /harness-prd
        Write a PRD for the payment integration feature we discussed. Include Stripe
        and support for one-time and recurring payments.
      scaffold_files:
        - "package.json"
        - "CLAUDE.md"
        - "src/index.ts"
    assert:
      - type: llm-rubric
        value: Output describes the problem or need the payment feature addresses (problem statement or domain section)
      - type: llm-rubric
        value: Output contains user-facing requirements or user stories for the payment feature
      - type: llm-rubric
        value: Output separates what the system must respect (constraints, compliance, integration points) from implementation decisions

  # ---------------------------------------------------------------------------
  # Eval 3: WHAT/HOW invariant — constraints section has no implementation details
  # ---------------------------------------------------------------------------
  - description: "#3 WHAT/HOW invariant — no implementation details in constraints"
    vars:
      prompt: >
        /harness-prd
        Write the PRD for adding CSV export to our reporting module.
      scaffold_files:
        - "package.json"
        - "CLAUDE.md"
    assert:
      - type: llm-rubric
        value: The constraints or decisions section does NOT include file paths, class names, module names, or schema decisions
      - type: llm-rubric
        value: The constraints or decisions section is predominantly system-level constraints (integrations, compliance, SLAs, boundaries) — user stories and user-facing capabilities are NOT placed in the constraints section

  # ---------------------------------------------------------------------------
  # Eval 4: GSD output path — writes to .planning/phases/01-discuss/
  # ---------------------------------------------------------------------------
  - description: "#4 GSD output — CONTEXT.md path and next-step message"
    vars:
      prompt: >
        /harness-prd
        Write the PRD for the notification system feature. Use GSD-compatible output.
      scaffold_files:
        - "package.json"
        - "CLAUDE.md"
        - ".planning/state.json"
    assert:
      - type: icontains
        value: ".planning/phases/01-discuss"
      - type: llm-rubric
        value: Mentions writing to .planning/phases/01-discuss/01-CONTEXT.md or equivalent GSD path
      - type: llm-rubric
        value: After writing, suggests running /harness-issues to plan the phase

  # ---------------------------------------------------------------------------
  # Eval 5: Spike recommendation when approach is uncertain
  # ---------------------------------------------------------------------------
  - description: "#5 spike recommendation on uncertain approach"
    vars:
      prompt: >
        /harness-prd
        We want to add real-time collaborative editing. Not sure if we should use
        CRDTs, OT, or a third-party service. Please write the PRD.
      scaffold_files:
        - "package.json"
        - "CLAUDE.md"
    assert:
      - type: llm-rubric
        value: Appends a spike recommendation because the solution approach is uncertain — mentions validating the approach before breaking down into implementation stories
      - type: llm-rubric
        value: Describes the spike as throwaway work producing a decision (proceed/pivot/split), not shippable code
