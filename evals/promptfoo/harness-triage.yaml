# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: harness-triage skill eval suite

prompts:
  - id: skill-prompt
    raw: "{{prompt}}"

providers:
  - id: python:provider.py
    label: llamacpp-harness-triage
    config:
      skill_name: harness-triage

defaultTest:
  options:
    provider: python:grader.py
  assert:
    - type: latency
      threshold: 300000

outputPath: output-harness-triage.json

tests:

  # ---------------------------------------------------------------------------
  # Eval 1: Show what needs attention — three buckets, no immediate action
  # ---------------------------------------------------------------------------
  - description: "#1 show what needs attention — three buckets presented"
    vars:
      prompt: >
        /harness-triage
        Show me anything that needs my attention on the issue tracker.
      scaffold_files: '["package.json", "CLAUDE.md"]'
    assert:
      - type: llm-rubric
        value: Queries the issue tracker before producing output — does not immediately triage without showing what needs attention first
      - type: llm-rubric
        value: Presents at least two of the three attention buckets — unlabeled, needs-triage, needs-info with reporter activity
      - type: llm-rubric
        value: Does NOT apply labels or take action on issues without maintainer direction

  # ---------------------------------------------------------------------------
  # Eval 2: Triage a specific issue — describes workflow, recommends, waits for direction
  # ---------------------------------------------------------------------------
  - description: "#2 triage specific issue — describe workflow, recommend, wait for direction"
    vars:
      prompt: >
        /harness-triage #42
        Please triage this issue for me.
      scaffold_files: '["package.json", "CLAUDE.md"]'
    assert:
      - type: llm-rubric
        value: Acknowledges it needs to read the issue content (body, comments, or labels) before it can give a complete triage recommendation
      - type: llm-rubric
        value: Does NOT unilaterally apply a label or change the issue state without the maintainer's explicit direction

  # ---------------------------------------------------------------------------
  # Eval 3: Bug triage — investigates available code before asking for more info
  # ---------------------------------------------------------------------------
  - description: "#3 bug triage — code investigation before grilling"
    vars:
      prompt: >
        /harness-triage
        Bug report: verifyToken('') throws "Cannot read property 'length' of undefined" in src/auth/index.ts.
        Reproduction: call verifyToken with an empty string.
        Please triage this.
      scaffold_files: '["package.json", "CLAUDE.md", "src/auth"]'
    assert:
      - type: llm-rubric
        value: References the auth module code (verifyToken function) to assess whether the reported exception is plausible given the implementation
      - type: llm-rubric
        value: Reports what the code analysis shows — confirmed, plausible, or insufficient detail — rather than immediately asking the reporter for more info

  # ---------------------------------------------------------------------------
  # Eval 4: Quick override — confirm mechanical steps, skip grilling
  # ---------------------------------------------------------------------------
  - description: "#4 quick override — confirm steps, skip grilling"
    vars:
      prompt: >
        /harness-triage Move #42 to ready-for-agent
      scaffold_files: '["package.json", "CLAUDE.md"]'
    assert:
      - type: llm-rubric
        value: Does NOT start a grilling session — does not ask about reproduction steps, codebase areas, or technical detail before applying the state change
      - type: llm-rubric
        value: Confirms the specific label or state changes it will make (e.g. which labels to apply or remove) before acting
      - type: llm-rubric
        value: Separately asks whether the maintainer wants an agent brief written for the issue

  # ---------------------------------------------------------------------------
  # Eval 5: AI disclaimer on every comment
  # ---------------------------------------------------------------------------
  - description: "#5 AI disclaimer present on generated issue content"
    vars:
      prompt: >
        /harness-triage #17
        Triage this issue and post triage notes asking the reporter for more info.
      scaffold_files: '["package.json", "CLAUDE.md"]'
    assert:
      - type: icontains
        value: "generated by AI"
      - type: llm-rubric
        value: Every AI-generated comment or issue body includes the disclaimer starting with "> *This was generated by AI"

  # ---------------------------------------------------------------------------
  # Eval 6: board field sync after agent brief posted
  # ---------------------------------------------------------------------------
  - description: "#6 board field sync — syncs Effort, Size, Priority after agent brief posted"
    vars:
      prompt: >
        /harness-triage #42
        The issue is ready. Post an agent brief with Effort: 3, then sync the board fields.
      scaffold_files: '["package.json", "CLAUDE.md", ".harness/config.json with project_fields populated"]'
    assert:
      - type: llm-rubric
        value: After the agent brief is posted, reads project_fields from .harness/config.json
      - type: llm-rubric
        value: Derives Size from Effort using the mapping — Effort 3 maps to Size M (3-4 windows = M)
      - type: llm-rubric
        value: Asks the maintainer for Priority (P1 / P2 / P3 / skip) exactly once after the brief is confirmed
      - type: llm-rubric
        value: Prints a confirmation line containing Effort, Size, and Priority (or "not set") after board field mutations

  # ---------------------------------------------------------------------------
  # Eval 7: board sync guard — skips with warning if project_fields absent
  # ---------------------------------------------------------------------------
  - description: "#7 board sync guard — skips sync when project_fields absent from .harness/config.json"
    vars:
      prompt: >
        /harness-triage #42
        Move to ready-for-agent and post an agent brief.
      scaffold_files: '["package.json", "CLAUDE.md", ".harness/config.json without project_fields"]'
    assert:
      - type: llm-rubric
        value: When project_fields is absent from .harness/config.json, prints a warning containing "project_fields not in .harness/config.json" and mentions running /setup-harness-skills
      - type: llm-rubric
        value: Skips board field mutations entirely — does not attempt GraphQL calls when project_fields is absent
      - type: llm-rubric
        value: Does NOT block the triage outcome — the issue brief is still posted even when board sync is skipped
