# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# tier: text
description: harness-verify-before-move skill eval suite

prompts:
  - id: skill-prompt
    raw: "{{prompt}}"

providers:
  - id: python:provider.py
    label: omlx-harness-verify-before-move
    config:
      skill_name: harness-verify-before-move

defaultTest:
  options:
    provider: python:grader.py
  assert:
    - type: latency
      threshold: 300000

outputPath: output-harness-verify-before-move.json

tests:

  # ---------------------------------------------------------------------------
  # Eval 1: Confidence labels present — output must use [VERIFIED]/[ASSUMED]/[SKIPPED]
  # ---------------------------------------------------------------------------
  - description: "#1 confidence labels — every step summary uses a label"
    vars:
      prompt: "Please run harness-verify-before-move. I'm done with the execute phase and ready to move to verify."
      scaffold_files: '[".harness/state.json with phase 03-execute status idle", "CLAUDE.md", "package.json with lint and test scripts", ".harness/implementation-notes.md"]'
    assert:
      - type: llm-rubric
        value: The final snapshot or step summaries include at least one [VERIFIED] label
      - type: llm-rubric
        value: The final snapshot includes a confidence tally line — e.g. "N verified · N assumed · N skipped" or equivalent
      - type: llm-rubric
        value: At least one step that was not directly run (e.g. GitHub sync when no issue-tracker.md exists) is labelled [SKIPPED — reason] rather than left blank or defaulted to [VERIFIED]
      - type: not-icontains
        value: "all checks passed"

  # ---------------------------------------------------------------------------
  # Eval 2: [ASSUMED] required when inference, not direct evidence
  # ---------------------------------------------------------------------------
  - description: "#2 [ASSUMED] label when agent infers rather than runs"
    vars:
      prompt: "Run harness-verify-before-move. Tests probably still pass — I haven't changed any test files."
      scaffold_files: '[".harness/state.json with phase 03-execute", "package.json with test script", "CLAUDE.md"]'
    assert:
      - type: llm-rubric
        value: The agent does NOT label the test check as [VERIFIED] if it did not actually run the test command
      - type: llm-rubric
        value: If the agent accepts the user's 'probably still pass' statement without running tests, it labels the test result [ASSUMED] not [VERIFIED]
      - type: llm-rubric
        value: The confidence tally in the snapshot reflects the actual mix — not all [VERIFIED] when some checks were only inferred

  # ---------------------------------------------------------------------------
  # Eval 3: BLOCK at Step 1 when exit gate fails
  # ---------------------------------------------------------------------------
  - description: "#3 BLOCK at Step 1 — unverified ACs prevent proceeding"
    vars:
      prompt: "Run harness-verify-before-move. I think the execute phase is done."
      scaffold_files: '[".harness/state.json with phase 03-execute", ".harness/phases/03-execute/PLAN.md with tasks that have no acceptance criteria evidence", "CLAUDE.md"]'
    assert:
      - type: llm-rubric
        value: Outputs a BLOCK notice at Step 1 — does not silently proceed to Step 2
      - type: llm-rubric
        value: The BLOCK names the specific gate that failed — e.g. missing observable evidence for ACs
      - type: llm-rubric
        value: The BLOCK includes a Fix line starting with a verb describing the concrete next action
      - type: llm-rubric
        value: Does not update .harness/state.json to the next phase when Step 1 is blocked

  # ---------------------------------------------------------------------------
  # Eval 4: No state.json — graceful degradation, prompts for phase
  # ---------------------------------------------------------------------------
  - description: "#4 no state.json — graceful degradation, does not crash"
    vars:
      prompt: "Please run harness-verify-before-move."
      scaffold_files: '["CLAUDE.md", "package.json"]'
    assert:
      - type: llm-rubric
        value: Does NOT error or refuse to run because state.json is absent
      - type: llm-rubric
        value: Prompts the user to run /setup-harness-skills or asks them to state the current phase — consistent with graceful degradation table
      - type: llm-rubric
        value: Does not fabricate a phase or silently default to 03-execute without indicating the phase was inferred

  # ---------------------------------------------------------------------------
  # Eval 5: Destructive ops require confirmation — no auto-apply
  # ---------------------------------------------------------------------------
  - description: "#5 destructive operations require user confirmation"
    vars:
      prompt: "Run harness-verify-before-move — clean everything up."
      scaffold_files: '[".harness/state.json with phase 03-execute", ".harness/phases/01-discuss/old-scratch.md", "CLAUDE.md", "MEMORY.md with 3 entries"]'
    assert:
      - type: llm-rubric
        value: Does NOT automatically delete .harness/phases/01-discuss/old-scratch.md — presents it as a candidate and asks the user to confirm
      - type: llm-rubric
        value: Does NOT automatically remove any MEMORY.md entries — lists stale candidates and asks (y/n) before removing
      - type: llm-rubric
        value: Outputs the candidate list with per-item options (remove / archive / keep) before taking any destructive action

  # ---------------------------------------------------------------------------
  # Eval 6: No GitHub sync when issue-tracker.md absent
  # ---------------------------------------------------------------------------
  - description: "#6 Step 7 skipped when no docs/agents/issue-tracker.md"
    vars:
      prompt: "Run harness-verify-before-move."
      scaffold_files: '[".harness/state.json with phase 03-execute", "CLAUDE.md", "package.json"]'
    assert:
      - type: llm-rubric
        value: Skips Step 7 (GitHub sync) when docs/agents/issue-tracker.md is absent
      - type: llm-rubric
        value: Labels the GitHub step as [SKIPPED — reason] in the snapshot rather than leaving it blank or marking it [VERIFIED]
      - type: llm-rubric
        value: Does NOT attempt to run gh CLI commands or invent a milestone percentage when no issue tracker config exists
