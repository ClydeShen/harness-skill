# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# tier: text
description: session-start skill eval suite

prompts:
  - id: skill-prompt
    raw: "{{prompt}}"

providers:
  - id: python:provider.py
    label: llamacpp-session-start
    config:
      skill_name: session-start

defaultTest:
  options:
    provider: python:grader.py
  assert:
    - type: latency
      threshold: 300000
    - type: not-icontains
      value: ".harness/STATE.md"
    - type: not-icontains
      value: ".continue-here.md"

outputPath: output-session-start.json

tests:

  # ---------------------------------------------------------------------------
  # Eval 1: state.json idle + .continue-here.json — structured briefing
  # ---------------------------------------------------------------------------
  - description: "#1 full session state — structured briefing before action"
    vars:
      prompt: "/session-start"
      scaffold_files: '[".harness/state.json with status idle phase 03-execute active_task issue 7 effort 1", ".harness/phases/03-execute/.continue-here.json with task 1 total_tasks 3", "CLAUDE.md"]'
    assert:
      - type: llm-rubric
        value: Outputs a session briefing that includes the phase as execute or 03-execute
      - type: llm-rubric
        value: Briefing includes a pick-up point or next action for the active task
      - type: llm-rubric
        value: Mentions running /context-handover when approaching 80% context usage

  # ---------------------------------------------------------------------------
  # Eval 2: No prior session state — graceful no-state handling
  # ---------------------------------------------------------------------------
  - description: "#2 no session state — graceful fallback, no errors"
    vars:
      prompt: "/session-start"
      scaffold_files: '["package.json"]'
    assert:
      - type: llm-rubric
        value: Does not error or refuse when no session state exists
      - type: llm-rubric
        value: Outputs a briefing noting no prior session state was found
      - type: llm-rubric
        value: Suggests running /setup-harness-skills to initialize .harness/ or asks user what to work on
      - type: llm-rubric
        value: Does NOT default to any phase without evidence

  # ---------------------------------------------------------------------------
  # Eval 3: Reads state.json, shows correct phase without asking questions
  # ---------------------------------------------------------------------------
  - description: "#3 reads project state — brief shows correct phase without asking"
    vars:
      prompt: "/session-start"
      scaffold_files: '["package.json", "CLAUDE.md", ".harness/state.json with status idle phase 02-plan"]'
    assert:
      - type: llm-rubric
        value: Outputs a briefing that shows the phase as plan or 02-plan (read from state.json) without asking the user what phase they are in
      - type: llm-rubric
        value: Does not ask questions whose answers are available in .harness/state.json

  # ---------------------------------------------------------------------------
  # Eval 4: Interrupted session — recovery briefing heading + git log suggestion
  # ---------------------------------------------------------------------------
  - description: "#4 interrupted session — recovery briefing heading + git log"
    vars:
      prompt: "/session-start"
      scaffold_files: '[".harness/state.json with status in_progress phase 03-execute active_task issue 42", ".harness/phases/03-execute/.continue-here.json with task 2 total_tasks 5", "CLAUDE.md"]'
    assert:
      - type: llm-rubric
        value: Output heading or title indicates this is a Recovery or Interrupted session briefing, not a normal clean Session briefing
      - type: llm-rubric
        value: Recovery briefing mentions the phase (03-execute or execute) and the active task or last known intent
      - type: llm-rubric
        value: Advises reviewing git log before proceeding
