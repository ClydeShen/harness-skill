# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: session-start skill eval suite

prompts:
  - id: skill-prompt
    raw: "{{prompt}}"

providers:
  - id: python:provider.py
    label: llamacpp-session-start
    config:
      skill_name: session-start

defaultTest:
  options:
    provider: python:grader.py
  assert:
    - type: latency
      threshold: 300000

outputPath: output-session-start.json

tests:

  # ---------------------------------------------------------------------------
  # Eval 1: STATE.md + .continue-here.md present — structured briefing
  # ---------------------------------------------------------------------------
  - description: "#1 full session state — structured briefing before action"
    vars:
      prompt: "/session-start"
      scaffold_files:
        - ".planning/STATE.md with idle session_status current_focus 03-execute and issue 7 effort 1"
        - ".planning/phases/03-execute/.continue-here.md with task 1 total_tasks 3"
        - "CLAUDE.md"
    assert:
      - type: llm-rubric
        value: Outputs a structured session briefing before doing anything else
      - type: llm-rubric
        value: Briefing includes phase (execute / 03-execute), active task number, and pick-up point from .continue-here.md
      - type: llm-rubric
        value: Includes the execute-phase budget table or references phase-budgets.md
      - type: llm-rubric
        value: Mentions running /context-handover when approaching 80% usage
      - type: llm-rubric
        value: Writes session_status in_progress to STATE.md before outputting briefing
      - type: llm-rubric
        value: Does not start writing code or taking actions before outputting the briefing

  # ---------------------------------------------------------------------------
  # Eval 2: No prior session state — graceful no-state handling
  # ---------------------------------------------------------------------------
  - description: "#2 no session state — graceful fallback, no errors"
    vars:
      prompt: "/session-start"
      scaffold_files:
        - "package.json"
    assert:
      - type: llm-rubric
        value: Does not error or refuse when no session state exists
      - type: llm-rubric
        value: Outputs a briefing noting no prior session state was found
      - type: llm-rubric
        value: Suggests running /setup-harness-skills to initialize .planning/ or asks user what to work on
      - type: llm-rubric
        value: Does NOT default to any phase without evidence

  # ---------------------------------------------------------------------------
  # Eval 3: Reads artifacts before asking questions
  # ---------------------------------------------------------------------------
  - description: "#3 reads project state before asking questions"
    vars:
      prompt: "/session-start"
      scaffold_files:
        - "package.json"
        - "CLAUDE.md"
        - ".planning/STATE.md with idle session_status current_focus 02-plan"
    assert:
      - type: llm-rubric
        value: Reads available project state before asking any questions
      - type: llm-rubric
        value: Does not ask questions that could be answered by reading .planning/STATE.md or git config
      - type: llm-rubric
        value: If phase cannot be determined from artifacts, explains what was found and asks the user

  # ---------------------------------------------------------------------------
  # Eval 4: Interrupted session — recovery briefing with git log diff
  # (Integration eval: tests session-start reading context-handover's state machine output)
  # ---------------------------------------------------------------------------
  - description: "#4 interrupted session — recovery briefing includes git log delta"
    vars:
      prompt: "/session-start"
      scaffold_files:
        - ".planning/STATE.md with interrupted session_status and stale timestamp and issue 42"
        - ".planning/phases/03-execute/.continue-here.md with task 2 total_tasks 5"
        - "CLAUDE.md"
    assert:
      - type: llm-rubric
        value: Detects interrupted session — STATE.md has session_status in_progress with stale timestamp
      - type: llm-rubric
        value: Outputs a Recovery briefing (not a normal Session briefing)
      - type: llm-rubric
        value: Recovery briefing includes a git log section showing changes since session_started timestamp
      - type: llm-rubric
        value: Recovery briefing includes the last known intent from STATE.md Stopped-at or .continue-here.md next_action
      - type: llm-rubric
        value: Advises reviewing git log before proceeding and running lint+build if state is inconsistent
      - type: llm-rubric
        value: Still writes session_status in_progress with new session_started timestamp to STATE.md
