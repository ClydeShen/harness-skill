# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: setup-harness-skills skill eval suite

prompts:
  - id: skill-prompt
    raw: "{{prompt}}"

providers:
  - id: python:provider.py
    label: llamacpp-setup-harness-skills
    config:
      skill_name: setup-harness-skills

defaultTest:
  options:
    provider: python:grader.py
  assert:
    - type: latency
      threshold: 300000

outputPath: output-setup-harness-skills.json

tests:

  # ---------------------------------------------------------------------------
  # Eval 1: New Next.js project — explores before asking, CLAUDE.md exists
  # ---------------------------------------------------------------------------
  - description: "#1 new project — explore-first, CLAUDE.md present"
    vars:
      prompt: "I'm starting a new Next.js project and want to use harness skills. Please set up the harness."
      scaffold_files:
        - "package.json with next.js"
        - "CLAUDE.md"
    assert:
      - type: llm-rubric
        value: Explores project state first (reads .git/config, existing instruction files, docs/agents/) before asking any questions
      - type: llm-rubric
        value: Presents a one-line summary of what it found before proceeding to questions
      - type: llm-rubric
        value: Asks about the issue tracker before asking about labels or domain docs (Section A comes first)
      - type: llm-rubric
        value: Does NOT ask all questions at once — questions are asked one section at a time
      - type: llm-rubric
        value: Mentions writing docs/agents/ seed files as part of the output steps
      - type: llm-rubric
        value: Mentions writing to CLAUDE.md (not AGENTS.md) because CLAUDE.md already exists
      - type: llm-rubric
        value: Does NOT propose creating AGENTS.md when CLAUDE.md exists

  # ---------------------------------------------------------------------------
  # Eval 2: Update existing harness — docs/agents already present
  # ---------------------------------------------------------------------------
  - description: "#2 update existing harness — docs/agents/ already configured"
    vars:
      prompt: "I want to update the harness setup. I already ran setup before — docs/agents/ exists with config files."
      scaffold_files:
        - "package.json"
        - "CLAUDE.md"
        - "docs/agents/issue-tracker.md with github issues config"
        - "docs/agents/triage-labels.md"
    assert:
      - type: llm-rubric
        value: Detects existing docs/agents/ config files during the explore step and notes them explicitly
      - type: llm-rubric
        value: Does not overwrite existing config with blank defaults without confirming
      - type: llm-rubric
        value: References the existing issue tracker config rather than re-asking from scratch

  # ---------------------------------------------------------------------------
  # Eval 3: No instruction file — asks which to create
  # ---------------------------------------------------------------------------
  - description: "#3 no instruction file — asks CLAUDE.md or AGENTS.md"
    vars:
      prompt: "Set up harness skills for this project. There is no CLAUDE.md or AGENTS.MD yet."
      scaffold_files:
        - "package.json"
    assert:
      - type: llm-rubric
        value: Detects that neither CLAUDE.md nor AGENTS.md exists during the explore step
      - type: llm-rubric
        value: Asks the user which instruction file to create (CLAUDE.md or AGENTS.md) — presents both options
      - type: llm-rubric
        value: Does NOT make the choice unilaterally or default to one without asking

  # ---------------------------------------------------------------------------
  # Eval 4: GSD already installed — configure harness namespace, not overwrite
  # ---------------------------------------------------------------------------
  - description: "#4 GSD already installed — configure harness namespace without overwriting GSD keys"
    vars:
      prompt: "/setup-harness-skills"
      scaffold_files:
        - ".harness/config.json without harness key"
        - "CLAUDE.md"
        - ".git/config with remote origin"
    assert:
      - type: llm-rubric
        value: Detects .harness/config.json is present (GSD installed)
      - type: llm-rubric
        value: Adds harness namespace to config.json without overwriting existing GSD keys
      - type: llm-rubric
        value: Does NOT create a new config.json from scratch — merges into existing
      - type: llm-rubric
        value: Notes that GSD is already installed and confirms the integration

  # ---------------------------------------------------------------------------
  # Eval 5: CI idempotency — existing workflows detected, Step 7 skipped
  # ---------------------------------------------------------------------------
  - description: "#5 CI idempotency — skips Step 7 when workflows exist"
    vars:
      prompt: "/setup-harness-skills"
      scaffold_files:
        - "package.json"
        - "CLAUDE.md"
        - ".github/workflows/test.yml with existing workflow"
    assert:
      - type: llm-rubric
        value: Detects existing .github/workflows/*.yml file during the explore step
      - type: llm-rubric
        value: Skips CI scaffold (Step 7) and records "CI scaffold skipped — existing workflows found" in the setup summary
      - type: llm-rubric
        value: Does NOT overwrite or modify the existing workflow file

  # ---------------------------------------------------------------------------
  # Eval 6: Issue templates written — Step 7a
  # ---------------------------------------------------------------------------
  - description: "#6 issue templates — Step 7a writes harness-issue.md and bug-report.md"
    vars:
      prompt: "/setup-harness-skills"
      scaffold_files:
        - "package.json"
        - "CLAUDE.md"
    assert:
      - type: llm-rubric
        value: Writes .github/ISSUE_TEMPLATE/harness-issue.md with Story / Confidence / Acceptance Criteria / Definition of Done / Effort / Dependencies sections
      - type: llm-rubric
        value: Writes .github/ISSUE_TEMPLATE/bug-report.md with What's broken / Steps to reproduce / Expected behavior / Acceptance Criteria / Definition of Done sections
      - type: llm-rubric
        value: Records "✅ .github/ISSUE_TEMPLATE/harness-issue.md written" and "✅ .github/ISSUE_TEMPLATE/bug-report.md written" in the setup summary
      - type: llm-rubric
        value: Step 7a is idempotent — skips any file that already exists at the destination

  # ---------------------------------------------------------------------------
  # Eval 7: project_fields written to harness.json after board creation
  # ---------------------------------------------------------------------------
  - description: "#7 project_fields written — Step 5 queries board metadata and writes project_fields"
    vars:
      prompt: "/setup-harness-skills"
      scaffold_files:
        - "package.json"
        - "CLAUDE.md"
        - ".claude/harness.json with project_v2_id set to PVT_abc123"
    assert:
      - type: llm-rubric
        value: After creating the board, queries board field metadata using gh api graphql to retrieve field IDs for Priority, Size, and Effort (windows)
      - type: llm-rubric
        value: Writes project_fields key to .claude/harness.json containing priority.id, priority.options, size.id, size.options, and effort.id
      - type: llm-rubric
        value: Creates Priority single-select field (P1/P2/P3) and Size single-select field (XS/S/M/L/XL) on the board if they do not already exist

  # ---------------------------------------------------------------------------
  # Eval 8: project_fields idempotent — merge over existing values, never overwrite
  # ---------------------------------------------------------------------------
  - description: "#8 project_fields idempotent — re-run merges, never overwrites existing keys"
    vars:
      prompt: "/setup-harness-skills"
      scaffold_files:
        - "package.json"
        - "CLAUDE.md"
        - ".claude/harness.json with project_fields.priority already populated"
    assert:
      - type: llm-rubric
        value: When project_fields already contains populated keys, the skill merges over existing values and does NOT overwrite keys that are already present
      - type: llm-rubric
        value: Describes the project_fields write as idempotent or states it skips keys already present
