# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: triage skill eval suite

prompts:
  - id: skill-prompt
    raw: "{{prompt}}"

providers:
  - id: python:provider.py
    label: llamacpp-triage
    config:
      skill_name: triage

defaultTest:
  options:
    provider: python:grader.py
  assert:
    - type: latency
      threshold: 300000

outputPath: output-triage.json

tests:

  # ---------------------------------------------------------------------------
  # Eval 1: /triage — full triage session
  # ---------------------------------------------------------------------------
  - description: "#1 /triage — queries tracker, shows buckets, waits before acting"
    vars:
      prompt: "/triage"
      scaffold_files:
        - "package.json"
        - "CLAUDE.md"
    assert:
      - type: llm-rubric
        value: Queries the issue tracker before producing output
      - type: llm-rubric
        value: Presents unlabeled, needs-triage, and needs-info buckets
      - type: llm-rubric
        value: "Every AI-generated comment includes the disclaimer '> *This was generated by AI during triage.*'"
      - type: llm-rubric
        value: Does not immediately triage without showing what needs attention first

  # ---------------------------------------------------------------------------
  # Eval 2: /triage #42 — single issue triage
  # ---------------------------------------------------------------------------
  - description: "#2 /triage #42 — reads full issue, recommends with reasoning"
    vars:
      prompt: "/triage #42"
      scaffold_files:
        - "package.json"
        - "CLAUDE.md"
    assert:
      - type: llm-rubric
        value: Reads the full issue body, comments, and labels before producing output
      - type: llm-rubric
        value: Recommends a category (bug/enhancement) and state with reasoning
      - type: llm-rubric
        value: Attempts reproduction for bug reports before grilling
      - type: llm-rubric
        value: Does not apply labels without waiting for maintainer direction

  # ---------------------------------------------------------------------------
  # Eval 3: /triage Move #42 to ready-for-agent — quick override, no grill
  # ---------------------------------------------------------------------------
  - description: "#3 /triage Move #42 — quick override, no grill session"
    vars:
      prompt: "/triage Move #42 to ready-for-agent"
      scaffold_files:
        - "package.json"
        - "CLAUDE.md"
    assert:
      - type: llm-rubric
        value: Applies the label directly without grilling
      - type: llm-rubric
        value: Confirms the intended actions before executing
      - type: llm-rubric
        value: Asks whether the maintainer wants an agent brief written
      - type: llm-rubric
        value: Does not start a grill-with-docs session for a quick override
