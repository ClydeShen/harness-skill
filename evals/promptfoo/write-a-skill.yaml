# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: write-a-skill skill eval suite

prompts:
  - id: skill-prompt
    raw: "{{prompt}}"

providers:
  - id: python:provider.py
    label: llamacpp-write-a-skill
    config:
      skill_name: write-a-skill

defaultTest:
  options:
    provider: python:grader.py
  assert:
    - type: latency
      threshold: 300000

outputPath: output-write-a-skill.json

tests:

  # ---------------------------------------------------------------------------
  # Eval 1: /write-a-skill — gathers requirements first, no premature SKILL.md
  # ---------------------------------------------------------------------------
  - description: "#1 /write-a-skill — gathers requirements before drafting"
    vars:
      prompt: "/write-a-skill"
      scaffold_files:
        - "package.json"
    assert:
      - type: llm-rubric
        value: Gathers requirements before drafting — asks about task domain, use cases, scripts, and reference materials
      - type: llm-rubric
        value: Does not produce a SKILL.md before understanding the requirements
      - type: llm-rubric
        value: Asks questions one at a time or as a grouped set before proceeding
      - type: llm-rubric
        value: Presents draft for review and asks whether it covers the use cases

  # ---------------------------------------------------------------------------
  # Eval 2: /write-a-skill with stated topic — produces concise, well-structured SKILL.md
  # ---------------------------------------------------------------------------
  - description: "#2 /write-a-skill with topic — concise SKILL.md, split refs if needed"
    vars:
      prompt: |
        /write-a-skill

        I want a skill that helps agents write database migrations safely
      scaffold_files:
        - "package.json"
    assert:
      - type: llm-rubric
        value: Produces SKILL.md under 500 lines
      - type: llm-rubric
        value: Description includes 'Use when [specific triggers]' phrasing
      - type: llm-rubric
        value: Splits detailed content to reference files if SKILL.md would exceed 500 lines
      - type: llm-rubric
        value: "Review checklist is satisfied: triggers in description, no time-sensitive info, concrete examples"
