# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: write-harness-skill skill eval suite

prompts:
  - id: skill-prompt
    raw: "{{prompt}}"

providers:
  - id: python:provider.py
    label: llamacpp-write-harness-skill
    config:
      skill_name: write-harness-skill

defaultTest:
  options:
    provider: python:grader.py
  assert:
    - type: latency
      threshold: 300000

outputPath: output-write-harness-skill.json

tests:

  # ---------------------------------------------------------------------------
  # Eval 1: Requirements gathered before drafting — no premature SKILL.md
  # ---------------------------------------------------------------------------
  - description: "#1 gathers requirements before drafting — no premature SKILL.md"
    vars:
      prompt: >
        /write-harness-skill
        I want a new skill for my project.
      scaffold_files:
        - "package.json"
    assert:
      - type: llm-rubric
        value: Gathers requirements before drafting — asks about task domain, use cases, scripts, or reference materials
      - type: llm-rubric
        value: Does NOT produce a SKILL.md before understanding the requirements
      - type: llm-rubric
        value: Asks questions before proceeding to the draft

  # ---------------------------------------------------------------------------
  # Eval 2: SKILL.md under 500 lines, "Use when" trigger, review checklist
  # ---------------------------------------------------------------------------
  - description: "#2 SKILL.md under 500 lines, Use when trigger, review checklist"
    vars:
      prompt: >
        /write-harness-skill

        I want a skill that helps agents write database migrations safely for a
        Django project. It should enforce backwards-compatible migrations, check
        for missing index creation, and verify rollback scripts exist.
      scaffold_files:
        - "package.json"
    assert:
      - type: llm-rubric
        value: Produces a SKILL.md that is under 500 lines
      - type: llm-rubric
        value: Description field includes "Use when [specific triggers]" phrasing so the agent knows when to load it
      - type: llm-rubric
        value: After producing the draft, includes any invitation for user input — may ask about coverage, note it is a draft, or invite the user to request changes

  # ---------------------------------------------------------------------------
  # Eval 3: Reference files split when content is large
  # ---------------------------------------------------------------------------
  - description: "#3 reference files used when SKILL.md would exceed 500 lines"
    vars:
      prompt: >
        /write-harness-skill

        I want a comprehensive skill covering our entire API design guidelines:
        REST conventions, pagination patterns, error response format, auth header
        requirements, rate limiting rules, versioning strategy, OpenAPI spec format,
        and 20+ example endpoint patterns. Make it thorough.
      scaffold_files:
        - "package.json"
    assert:
      - type: llm-rubric
        value: Discusses or recommends using reference files for detailed content — may appear in prose, an explanation, or as a structural decision even if the links are not yet in the SKILL.md template
      - type: llm-rubric
        value: Output acknowledges that all detailed content should not live inline in SKILL.md — may reference separate files, note the split approach, or include a placeholder reference

  # ---------------------------------------------------------------------------
  # Eval 4: Harness checklist — token budget, setup-harness-skills, AI footer
  # ---------------------------------------------------------------------------
  - description: "#4 harness checklist — token budget, setup-harness-skills, AI footer gates"
    vars:
      prompt: >
        /write-harness-skill

        Create a skill for triaging GitHub issues in our project. It should post
        triage notes as comments on issues and apply labels.
      scaffold_files:
        - "package.json"
        - "CLAUDE.md"
    assert:
      - type: llm-rubric
        value: Mentions token budget or context window usage for the skill — may appear in the description field, review checklist, or as a harness consideration
      - type: llm-rubric
        value: Mentions /setup-harness-skills as a reference when the skill needs issue tracker setup config — may appear in the skill content, gotchas, or review checklist
      - type: llm-rubric
        value: Mentions that issue tracker posts should include an AI-generated footer or attribution such as a 🤖 marker — may appear in skill instructions, gotchas, or review checklist
